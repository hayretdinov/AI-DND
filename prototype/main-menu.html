<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-DND — Главное меню</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      color: #e8d3a0;
      background: #050505;
    }

    .main-menu {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.65) 0%,
          rgba(0, 0, 0, 0.35) 28%,
          rgba(0, 0, 0, 0.1) 55%,
          rgba(0, 0, 0, 0.35) 100%
        ),
        url("assets/main-menu-bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .rain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(255, 255, 255, 0.12) 1px,
          transparent 1px,
          transparent 7px
        );
      background-size: 90px 90px;
      opacity: 0.18;
      animation: rainMove 0.55s linear infinite;
    }

    @keyframes rainMove {
      from {
        background-position: 0 0;
      }
      to {
        background-position: -90px 90px;
      }
    }

    .menu-area {
      position: absolute;
      left: 105px;
      top: 80px;
      width: 360px;
      height: 760px;
    }

    .banner-pole {
      position: absolute;
      left: 0;
      top: 0;
      width: 24px;
      height: 610px;
      background:
        linear-gradient(90deg, #1c1008, #6b3e1d, #201109);
      border: 2px solid #110905;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.8),
        0 0 20px rgba(0,0,0,0.9);
    }

    .banner-top {
      position: absolute;
      left: -14px;
      top: 18px;
      width: 330px;
      height: 20px;
      background:
        linear-gradient(#5b3519, #1b0f08);
      border: 2px solid #120905;
      box-shadow: 0 0 14px rgba(0,0,0,0.9);
    }

    .banner {
      position: absolute;
      left: 48px;
      top: 42px;
      width: 245px;
      height: 300px;
      background:
        linear-gradient(
          180deg,
          rgba(12, 14, 16, 0.95),
          rgba(5, 5, 6, 0.98)
        );
      border-left: 3px solid #2a1b10;
      border-right: 3px solid #2a1b10;
      box-shadow:
        inset 0 0 35px rgba(0,0,0,0.9),
        0 0 35px rgba(0,0,0,0.9);
      clip-path: polygon(
        0 0,
        100% 0,
        100% 86%,
        86% 80%,
        73% 92%,
        58% 83%,
        43% 97%,
        29% 84%,
        14% 92%,
        0 84%
      );
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(172, 123, 59, 0.28);
      pointer-events: none;
    }

    .sigil {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: 86px;
      height: 86px;
      border: 2px solid rgba(185, 130, 62, 0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c99a52;
      font-size: 42px;
      text-shadow: 0 0 12px rgba(220, 150, 65, 0.5);
      box-shadow:
        inset 0 0 16px rgba(200, 130, 45, 0.14),
        0 0 18px rgba(0,0,0,0.9);
    }

    .title {
      position: absolute;
      top: 160px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 46px;
      letter-spacing: 3px;
      color: #c29a61;
      text-shadow:
        0 3px 2px rgba(0,0,0,0.95),
        0 0 18px rgba(200,130,55,0.32);
      margin: 0;
    }

    .subtitle {
      position: absolute;
      top: 218px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #7f6a4c;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .menu-buttons {
      position: absolute;
      left: 64px;
      top: 390px;
      width: 285px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .menu-button {
      position: relative;
      height: 66px;
      border: none;
      cursor: pointer;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      color: #f0d399;
      text-shadow: 0 2px 2px rgba(0,0,0,0.95);
      background:
        linear-gradient(
          180deg,
          #6b4524 0%,
          #3c2413 45%,
          #24140a 100%
        );
      box-shadow:
        inset 0 0 12px rgba(255, 210, 120, 0.09),
        inset 0 -10px 18px rgba(0,0,0,0.45),
        0 7px 0 #120904,
        0 0 18px rgba(0,0,0,0.8);
      clip-path: polygon(
        8% 0,
        92% 0,
        100% 22%,
        96% 50%,
        100% 78%,
        92% 100%,
        8% 100%,
        0 78%,
        4% 50%,
        0 22%
      );
      transition: 0.15s ease;
    }

    .menu-button::before {
      content: "";
      position: absolute;
      inset: 7px 13px;
      border: 1px solid rgba(207, 150, 80, 0.38);
      clip-path: polygon(
        8% 0,
        92% 0,
        100% 24%,
        96% 50%,
        100% 76%,
        92% 100%,
        8% 100%,
        0 76%,
        4% 50%,
        0 24%
      );
      pointer-events: none;
    }

    .menu-button:hover {
      color: #fff1bf;
      transform: translateX(8px);
      filter: brightness(1.14);
      box-shadow:
        inset 0 0 18px rgba(255, 210, 120, 0.15),
        inset 0 -10px 18px rgba(0,0,0,0.45),
        0 7px 0 #120904,
        0 0 24px rgba(212, 132, 43, 0.35);
    }

    .menu-button:active {
      transform: translateX(8px) translateY(3px);
      box-shadow:
        inset 0 0 20px rgba(0,0,0,0.75),
        0 3px 0 #120904;
    }

    .menu-button.disabled {
      opacity: 0.52;
      filter: grayscale(0.35);
      cursor: not-allowed;
    }

    .menu-button.disabled:hover {
      transform: none;
      color: #f0d399;
      box-shadow:
        inset 0 0 12px rgba(255, 210, 120, 0.09),
        inset 0 -10px 18px rgba(0,0,0,0.45),
        0 7px 0 #120904,
        0 0 18px rgba(0,0,0,0.8);
    }

    .language {
      position: absolute;
      left: 70px;
      top: 700px;
      display: flex;
      gap: 10px;
    }

    .language button {
      width: 54px;
      height: 34px;
      border: 1px solid #6e4a29;
      background: rgba(22, 13, 7, 0.82);
      color: #c6a46a;
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
    }

    .language button.active,
    .language button:hover {
      color: #f6d997;
      border-color: #c58b48;
      background: rgba(68, 42, 20, 0.92);
    }

    .version {
      position: absolute;
      right: 28px;
      bottom: 20px;
      font-size: 13px;
      color: rgba(210, 180, 120, 0.45);
      letter-spacing: 1px;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: 45px;
      transform: translateX(-50%);
      padding: 14px 22px;
      border: 1px solid rgba(170, 115, 55, 0.55);
      background: rgba(8, 6, 4, 0.78);
      color: #d7bc85;
      font-size: 16px;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
    }

    .message.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <main class="main-menu">
    <div class="rain"></div>

    <section class="menu-area">
      <div class="banner-pole"></div>
      <div class="banner-top"></div>

      <div class="banner">
        <div class="sigil">✦</div>
        <h1 class="title">AI-DND</h1>
        <div class="subtitle" data-i18n="subtitle">Долина Пепла ждёт</div>
      </div>

      <nav class="menu-buttons">
        <button class="menu-button" id="newGameBtn">Новая игра</button>
        <button class="menu-button disabled" id="continueBtn">Продолжить</button>
        <button class="menu-button" id="settingsBtn">Настройки</button>
        <button class="menu-button" id="exitBtn">Выход</button>
      </nav>

      <div class="language">
        <button id="ruBtn" class="active">RU</button>
        <button id="enBtn">EN</button>
      </div>
    </section>

    <div class="version">prototype interface v0.2</div>
    <div class="message" id="message"></div>
  </main>

  <script>
    const text = {
      ru: {
        subtitle: "Долина Пепла ждёт",
        newGame: "Новая игра",
        continue: "Продолжить",
        settings: "Настройки",
        exit: "Выход",
        noSave: "Сохранение не найдено",
        settingsSoon: "Настройки будут добавлены позже",
        exitInfo: "Игра работает в браузере"
      },
      en: {
        subtitle: "The Ashen Valley awaits",
        newGame: "New Game",
        continue: "Continue",
        settings: "Settings",
        exit: "Exit",
        noSave: "No save found",
        settingsSoon: "Settings will be added later",
        exitInfo: "The game runs in the browser"
      }
    };

    let lang = localStorage.getItem("ai-dnd-language") || "ru";

    const subtitle = document.querySelector("[data-i18n='subtitle']");
    const newGameBtn = document.getElementById("newGameBtn");
    const continueBtn = document.getElementById("continueBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const exitBtn = document.getElementById("exitBtn");
    const ruBtn = document.getElementById("ruBtn");
    const enBtn = document.getElementById("enBtn");
    const message = document.getElementById("message");

    function showMessage(value) {
      message.textContent = value;
      message.classList.add("show");
      setTimeout(() => message.classList.remove("show"), 1800);
    }

    function hasSave() {
      return Boolean(localStorage.getItem("ai-dnd-save"));
    }

    function applyLanguage() {
      const t = text[lang];

      subtitle.textContent = t.subtitle;
      newGameBtn.textContent = t.newGame;
      continueBtn.textContent = t.continue;
      settingsBtn.textContent = t.settings;
      exitBtn.textContent = t.exit;

      ruBtn.classList.toggle("active", lang === "ru");
      enBtn.classList.toggle("active", lang === "en");

      localStorage.setItem("ai-dnd-language", lang);
    }

    function updateContinue() {
      continueBtn.classList.toggle("disabled", !hasSave());
    }

    newGameBtn.addEventListener("click", () => {
      location.href = "character-creation.html";
    });

    continueBtn.addEventListener("click", () => {
      if (!hasSave()) {
        showMessage(text[lang].noSave);
        return;
      }

      showMessage("World Map будет добавлена позже");
    });

    settingsBtn.addEventListener("click", () => {
      showMessage(text[lang].settingsSoon);
    });

    exitBtn.addEventListener("click", () => {
      showMessage(text[lang].exitInfo);
    });

    ruBtn.addEventListener("click", () => {
      lang = "ru";
      applyLanguage();
    });

    enBtn.addEventListener("click", () => {
      lang = "en";
      applyLanguage();
    });

    applyLanguage();
    updateContinue();
  </script>
</body>
</html>
